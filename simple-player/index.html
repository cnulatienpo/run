/*
THIS IS THE ONLY VIDEO PLAYER.

ALL FIXES MUST HAPPEN HERE.

DO NOT CREATE NEW PLAYERS.
DO NOT EDIT ARCHIVED PLAYERS.
*/
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple World Treadmill Player</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="activePlayerLabel" style="position:fixed;top:0;left:0;z-index:9999;background:rgba(0,0,0,0.75);color:#f3e8ae;font:700 11px/1 monospace;letter-spacing:.1em;padding:5px 10px;pointer-events:none;">ACTIVE PLAYER: simple-player/index.html</div>
    <main class="player-shell" id="playerShell">
      <div class="video-layer" id="layerA">
        <video id="videoA" class="player-video is-active" muted playsinline preload="auto"></video>
      </div>
      <div class="video-layer" id="layerB">
        <video id="videoB" class="player-video" muted playsinline preload="auto"></video>
      </div>
      <canvas id="loopFreezeFrame" class="loop-freeze-frame" aria-hidden="true"></canvas>
      <audio id="musicPlayer" class="music-player" controls preload="metadata"></audio>

      <section class="player-panel" aria-label="Player controls">
        <div class="panel-border panel-border-one" aria-hidden="true"></div>
        <div class="panel-border panel-border-two" aria-hidden="true"></div>

        <div class="panel-inner">
          <header class="panel-heading">
            <p class="eyebrow">Simple Player Upgrade</p>
            <h1>World treadmill</h1>
            <p class="description">
              Two videos only. Native playback. Circular clip continuity. Switch worlds on the next clip boundary.
            </p>
            <button id="uiToggleDevPanel" class="scribble-button secondary dev-toggle-button" type="button" aria-expanded="true">
              Hide Dev UI
            </button>
            <a href="/tunnel-maker/" class="scribble-button secondary" target="_blank" rel="noopener noreferrer">Tunnel Maker</a>
          </header>

          <div class="world-switcher" aria-label="World selection">
            <button class="scribble-button world-button is-current" type="button" data-world-button="grey">Grey</button>
            <button class="scribble-button world-button" type="button" data-world-button="clown">Clown</button>
          </div>

          <div class="world-readout" aria-live="polite">
            <span><strong>Current:</strong> <span id="currentWorldLabel">Grey</span></span>
            <span><strong>Next:</strong> <span id="nextWorldLabel">—</span></span>
          </div>

          <div class="control-grid">
            <button id="playButton" class="scribble-button" type="button">Play Session</button>

            <label class="control-block" for="durationSelect">
              <span class="control-label">Run duration</span>
              <select id="durationSelect" class="scribble-select">
                <option value="300">5 min</option>
                <option value="600">10 min</option>
                <option value="900" selected>15 min</option>
                <option value="1200">20 min</option>
                <option value="1800">30 min</option>
                <option value="2700">45 min</option>
                <option value="3600">60 min</option>
              </select>
            </label>

            <button id="fullscreenButton" class="scribble-button secondary" type="button">Fullscreen</button>

            <section class="control-block music-block" aria-label="Music controls">
              <span class="control-label">Music</span>
              <label class="upload-label" for="musicUpload">Upload local audio</label>
              <input id="musicUpload" type="file" accept="audio/*" />
              <div class="placeholder-row">
                <button type="button" class="placeholder-button" disabled>Spotify later</button>
                <button type="button" class="placeholder-button" disabled>Google Music later</button>
              </div>
            </section>
          </div>

          <div id="statusReadout" class="status-readout" aria-live="polite"></div>

          <section id="advancedControls" class="advanced-controls" aria-label="Advanced playback controls">
            <h2 class="advanced-title">Advanced Controls</h2>

            <div class="advanced-grid">
              <label class="advanced-control advanced-control-inline" for="uiLockWorld">
                <input type="checkbox" id="uiLockWorld" checked />
                <span>Lock world minimum time</span>
              </label>

              <label class="advanced-control" for="uiMinWorldTime">
                <span class="control-label">Min world time (ms)</span>
                <input id="uiMinWorldTime" class="scribble-input" type="number" value="60000" step="1000" min="0" />
              </label>

              <label class="advanced-control" for="uiForceWorld">
                <span class="control-label">Force world</span>
                <select id="uiForceWorld" class="scribble-select">
                  <option value="">Auto</option>
                  <option value="grey">Grey</option>
                  <option value="clown">Clown</option>
                </select>
              </label>

              <label class="advanced-control advanced-control-inline" for="uiDisableSwitch">
                <input type="checkbox" id="uiDisableSwitch" />
                <span>Disable world switching</span>
              </label>

              <label class="advanced-control" for="uiEntryOffset">
                <span class="control-label">Force entry offset (0-1)</span>
                <input id="uiEntryOffset" class="scribble-input" type="number" step="0.1" min="0" max="1" placeholder="Auto" />
              </label>

              <label class="advanced-control" for="uiForcedDuration">
                <span class="control-label">Force duration (seconds)</span>
                <input id="uiForcedDuration" class="scribble-input" type="number" step="0.1" min="0" placeholder="Auto" />
              </label>
              <label class="advanced-control" for="uiTransitionSeconds">
                <span class="control-label">Transition seconds</span>
                <input id="uiTransitionSeconds" class="scribble-input" type="number" step="0.1" min="0" value="0.8" />
              </label>

              <label class="advanced-control" for="uiAspectMode">
                <span class="control-label">Aspect mode</span>
                <select id="uiAspectMode" class="scribble-select">
                  <option value="cover" selected>Cover</option>
                  <option value="contain">Contain</option>
                  <option value="stretch">Stretch</option>
                </select>
              </label>

              <label class="advanced-control" for="uiStretchX">
                <span class="control-label">Stretch X (0.5-1.5)</span>
                <input id="uiStretchX" class="scribble-input" type="number" step="0.05" min="0.5" max="1.5" value="1" />
              </label>

              <label class="advanced-control" for="uiStretchY">
                <span class="control-label">Stretch Y (0.5-1.5)</span>
                <input id="uiStretchY" class="scribble-input" type="number" step="0.05" min="0.5" max="1.5" value="1" />
              </label>
            </div>

            <div class="advanced-actions">
              <button id="uiLogState" class="scribble-button secondary" type="button">Log State</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./player.js"></script>
  </body>
</html>
