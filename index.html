<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Layer Relay Player</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform-origin: center center;
      will-change: transform;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
    }

    .debug {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .badge {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 14px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      box-shadow: 0 0 14px currentColor;
      transform: translateZ(0);
    }

    .active .dot {
      color: #ff2b2b;
      background: #ff2b2b;
    }

    .next .dot {
      color: #2dfc5b;
      background: #2dfc5b;
    }

    .active {
      z-index: 2;
    }

    .next {
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script>
    const assets = [
      '#1f3a93',
      '#8e44ad',
      '#16a085',
      '#d35400',
      '#2c3e50',
      '#c0392b'
    ];

    const stage = document.getElementById('stage');

    function createLayer() {
      const layer = document.createElement('div');
      layer.className = 'layer';

      const debug = document.createElement('div');
      debug.className = 'debug';

      const badge = document.createElement('div');
      badge.className = 'badge';

      const dot = document.createElement('div');
      dot.className = 'dot';

      debug.appendChild(dot);
      debug.appendChild(badge);
      layer.appendChild(debug);
      stage.appendChild(layer);

      return { el: layer, badge };
    }

    const layerA = createLayer();
    const layerB = createLayer();

    let activeLayer = layerA;
    let nextLayer = layerB;

    let scale = 1;
    const maxScale = 6;
    const scaleSpeedPerSecond = 0.85;

    let assetIndex = 0;

    function nextAsset() {
      const value = assets[assetIndex % assets.length];
      assetIndex += 1;
      return value;
    }

    function setRole(layer, role) {
      layer.el.classList.remove('active', 'next');
      layer.el.classList.add(role);
      layer.badge.textContent = role.toUpperCase();
    }

    function loadAsset(layer) {
      layer.el.style.background = nextAsset();
    }

    function resetAsNext(layer) {
      layer.el.style.transform = 'scale(1)';
      setRole(layer, 'next');
      loadAsset(layer);
    }

    // Initial state
    loadAsset(activeLayer);
    setRole(activeLayer, 'active');
    activeLayer.el.style.transform = 'scale(1)';

    resetAsNext(nextLayer);

    let previousTime = performance.now();

    function frame(now) {
      const dt = (now - previousTime) / 1000;
      previousTime = now;

      scale += scaleSpeedPerSecond * dt;
      activeLayer.el.style.transform = `scale(${scale.toFixed(4)})`;

      if (scale >= maxScale) {
        [activeLayer, nextLayer] = [nextLayer, activeLayer];

        setRole(activeLayer, 'active');
        scale = 1;
        activeLayer.el.style.transform = 'scale(1)';

        resetAsNext(nextLayer);
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
