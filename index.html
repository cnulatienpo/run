<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two-Layer Relay Player (Restored Baseline)</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      isolation: isolate;
    }

    .relay-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform-origin: center center;
      will-change: transform;
      pointer-events: none;
      user-select: none;
      background: transparent;
    }

    .active {
      z-index: 2;
    }

    .next {
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="stage">
    <img id="layer-a" class="relay-layer" alt="Relay layer A" draggable="false" />
    <img id="layer-b" class="relay-layer" alt="Relay layer B" draggable="false" />
  </div>

  <script>
    /*
      FULL SYSTEM AUDIT SUMMARY (baseline restoration only)
      - Removed:
        * Generated rectangle/square color layers and marker UI.
        * Any non-image geometry replacing PNG content.
        * In-screen debug/dev overlay panels.
      - Replaced:
        * DIV-based fake layers with two real IMG layers.
      - What broke the system:
        * Relay was switched to synthetic shape rendering, so real PNG transparency and image relay behavior were lost.
      - Restored:
        * Two-layer relay player using activeLayer/nextLayer IMG elements.
        * PNG src assignment on both layers.
        * requestAnimationFrame scale loop and swap pattern:
          [activeLayer, nextLayer] = [nextLayer, activeLayer]
        * Transparent PNG rendering path (no canvas, no forced opaque backgrounds).
      - Intentionally not added in this restore:
        * No portal logic, no masking, no hole alignment, no bbox logic.
    */

    const assets = Array.from({ length: 108 }, (_, i) => {
      const index = String(i).padStart(4, '0');
      return `relay-player/assets/pngs/final_rgba/f_${index}.png`;
    });

    const layerA = { el: document.getElementById('layer-a') };
    const layerB = { el: document.getElementById('layer-b') };

    let activeLayer = layerA;
    let nextLayer = layerB;

    let scale = 1;
    const maxScale = 6;
    const scaleSpeedPerSecond = 0.85;

    let assetIndex = 0;

    function nextAsset() {
      const value = assets[assetIndex % assets.length];
      assetIndex += 1;
      return value;
    }

    function setRole(layer, role) {
      layer.el.classList.remove('active', 'next');
      layer.el.classList.add(role);
    }

    function loadAsset(layer) {
      const src = nextAsset();
      layer.el.src = src;
      console.log(`[relay] ${layer.el.id} <= ${src}`);
    }

    function resetAsNext(layer) {
      layer.el.style.transform = 'scale(1)';
      setRole(layer, 'next');
      loadAsset(layer);
    }

    // Initial state
    loadAsset(activeLayer);
    setRole(activeLayer, 'active');
    activeLayer.el.style.transform = 'scale(1)';

    resetAsNext(nextLayer);

    let previousTime = performance.now();

    function frame(now) {
      const dt = (now - previousTime) / 1000;
      previousTime = now;

      scale += scaleSpeedPerSecond * dt;
      activeLayer.el.style.transform = `scale(${scale.toFixed(4)})`;

      if (scale >= maxScale) {
        [activeLayer, nextLayer] = [nextLayer, activeLayer];

        setRole(activeLayer, 'active');
        scale = 1;
        activeLayer.el.style.transform = 'scale(1)';

        resetAsNext(nextLayer);
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
