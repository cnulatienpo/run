<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three-Layer Relay Player</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      isolation: isolate;
    }

    .relay-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform-origin: center center;
      will-change: transform;
      pointer-events: none;
      user-select: none;
      background: transparent;
    }

    .front { z-index: 3; }
    .back { z-index: 2; }
    .deep { z-index: 1; }
  </style>
</head>
<body>
  <div id="stage">
    <img id="layer-front" class="relay-layer" alt="Front layer" draggable="false" />
    <img id="layer-back" class="relay-layer" alt="Back layer" draggable="false" />
    <img id="layer-deep" class="relay-layer" alt="Deep layer" draggable="false" />
  </div>

  <script>
    /*
      FULL SYSTEM AUDIT SUMMARY (baseline restoration only)
      - Removed:
        * Generated rectangle/square color layers and marker UI.
        * Any non-image geometry replacing PNG content.
        * In-screen debug/dev overlay panels.
      - Replaced:
        * DIV-based fake layers with two real IMG layers.
      - What broke the system:
        * Relay was switched to synthetic shape rendering, so real PNG transparency and image relay behavior were lost.
      - Restored:
        * Two-layer relay player using activeLayer/nextLayer IMG elements.
        * PNG src assignment on both layers.
        * requestAnimationFrame scale loop and swap pattern:
          [activeLayer, nextLayer] = [nextLayer, activeLayer]
        * Transparent PNG rendering path (no canvas, no forced opaque backgrounds).
      - Intentionally not added in this restore:
        * No portal logic, no masking, no hole alignment, no bbox logic.
    */

    const assets = Array.from({ length: 108 }, (_, i) => {
      const index = String(i).padStart(4, '0');
      return `relay-player/assets/pngs/final_rgba/f_${index}.png`;
    });

    const layers = [
      { el: document.getElementById('layer-front'), scale: 1.0, role: 'front' },
      { el: document.getElementById('layer-back'), scale: 0.68, role: 'back' },
      { el: document.getElementById('layer-deep'), scale: 0.42, role: 'deep' }
    ];
    const relayRoot = document.getElementById('stage');

    const PASS_SCALE = 2.35;
    const scaleSpeedPerSecond = 0.85;

    let assetIndex = 0;

    function nextAsset() {
      const value = assets[assetIndex % assets.length];
      assetIndex += 1;
      return value;
    }

    function setRole(layer, role) {
      layer.role = role;
      layer.el.classList.remove('front', 'back', 'deep');
      layer.el.classList.add(role);
    }

    function loadAsset(layer) {
      const src = nextAsset();
      layer.el.src = src;
      console.log(`[relay] ${layer.el.id} <= ${src}`);
    }

    function applyLayerTransform(layer) {
      layer.el.style.transformOrigin = '50% 50%';
      const centerX = relayRoot.clientWidth / 2;
      const centerY = relayRoot.clientHeight / 2;
      const holeX = layer.hole?.x ?? centerX;
      const holeY = layer.hole?.y ?? centerY;
      const dx = centerX - holeX;
      const dy = centerY - holeY;
      const t = Math.max(0, Math.min(1, (layer.scale - 1) / (PASS_SCALE - 1)));
      const offsetX = dx * t;
      const offsetY = dy * t;
      layer.el.style.transform = `translate(calc(-50% + ${offsetX.toFixed(2)}px), calc(-50% + ${offsetY.toFixed(2)}px)) scale(${layer.scale.toFixed(4)})`;
    }

    function recycleFront() {
      const front = layers.find((l) => l.role === 'front');
      const back = layers.find((l) => l.role === 'back');
      const deep = layers.find((l) => l.role === 'deep');

      setRole(front, 'deep');
      front.scale = 0.42;
      loadAsset(front);

      setRole(back, 'front');
      setRole(deep, 'back');
    }

    layers.forEach((layer) => {
      loadAsset(layer);
      setRole(layer, layer.role);
      applyLayerTransform(layer);
    });

    let previousTime = performance.now();

    function frame(now) {
      const dt = (now - previousTime) / 1000;
      previousTime = now;

      layers.forEach((layer) => {
        layer.scale += scaleSpeedPerSecond * dt;
        applyLayerTransform(layer);
      });

      if (layers.find((l) => l.role === 'front').scale >= PASS_SCALE) {
        recycleFront();
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
