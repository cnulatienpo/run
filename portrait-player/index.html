<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="playerRoot">
    <div id="playerContainer">

      <!-- Background blur / edge-fill layer -->
      <video id="bgVideo" muted loop playsinline aria-hidden="true"></video>

      <!-- Foreground A (starts as active) -->
      <video id="fgA" muted loop playsinline></video>

      <!-- Foreground B (starts as standby; swaps with A each transition) -->
      <video id="fgB" muted loop playsinline></video>

      <!-- Floating control panel -->
      <div id="controlPanel" class="control-panel">
        <div class="mode-label" id="modeLabel">COVER</div>

        <div class="btn-group">
          <button class="mode-btn active" data-mode="cover">COVER</button>
          <button class="mode-btn"        data-mode="contain">CONTAIN</button>
          <button class="mode-btn"        data-mode="stretch">STRETCH</button>
        </div>

        <button id="edgeFillBtn" class="toggle-btn active">EDGE FILL: ON</button>

        <div class="nav-hint">
          <kbd>A</kbd> prev &nbsp; <kbd>D</kbd> next
        </div>
      </div>

    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
