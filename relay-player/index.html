<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Player – Camera Through Hole</title>

<style>
/* =========================
   PAGE SETUP
========================= */
html, body {
  height: 100%;
  margin: 0;
  background: #16161600;
}

body {
  display: grid;
  place-items: center;
  overflow: hidden;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* =========================
   MAIN VIEWPORT (THE SCREEN)
========================= */
#relay-root {
  position: relative;
  width: min(96vw, 1600px);
  height: min(72vw, 1200px);
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background-color: #0d0d0d00;
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  border: none;
  border-radius: 0;
  box-shadow: none;
}

/*/* =========================
   SHARED LAYERS (ZOOM LOOP)
========================= */

#deep-layer,
#back-layer,
#front-layer {
  position: absolute;
  top: 50%;
  left: 50%;

  width: 100%;
  height: 100%;

  transform-origin: center center; /* will be overridden in JS to hole center */
  transform: translate(-50%, -50%); /* anchor layers to center */

  pointer-events: none;
  object-fit: cover;
}

#deep-layer { z-index: 0; }
#back-layer { z-index: 1; }
#front-layer { z-index: 2; background: none; }
/* =========================
   DEBUG OVERLAY
========================= */
#debug-canvas {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* =========================
   UI PANEL
========================= */
#control-panel {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 50;
  width: 300px;
  max-height: calc(100vh - 24px);
  overflow-y: auto;
  padding: 10px;
  border-radius: 8px;
  background: rgba(35, 36, 34, 0.72);
  color: #eee;
  backdrop-filter: blur(4px);
}

#control-panel h3 {
  margin: 0 0 8px 0;
  font-size: 14px;
  font-weight: 600;
}

#playBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

#copyFrontBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

#manualModeBtn,
#nextFrameBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

.control {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  align-items: center;
  margin: 6px 0;
}

.control input[type="range"] {
  grid-column: 1 / span 2;
  width: 100%;
}

.value {
  font-variant-numeric: tabular-nums;
  color: #9ad;
}

.layer-group {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid rgba(255, 255, 255, 0.25);
}

.layer-title {
  margin: 0 0 4px 0;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
</style>
</head>

<body>

<div id="relay-root">
  <img id="deep-layer" alt="Deep layer">
  <img id="back-layer" alt="Back layer">
  <img id="front-layer" alt="Front layer">
  <canvas id="debug-canvas"></canvas>
</div>

<div id="control-panel">
  <h3>Relay Controls</h3>
  <button id="playBtn">Pause</button>
  <button id="manualModeBtn">Mode: Auto</button>
  <button id="nextFrameBtn" disabled>Next Frame</button>
  <button id="copyFrontBtn">Copy Front -> Back + Deep</button>
  <div id="controls"></div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const FRONT_DIR = 'assets'
const DEPTH_DIR = 'assets'

let frontAssets = []
let depthAssets = []

const config = {
  playbackFps: 2,     // how often frames update
  zoomSpeed: 0.05,    // how fast frames scale up each tick
  maxZoom: 8.0,       // when a frame is considered “done” and recycles

  // temporary hole definition (replace later if you re-add detection)
  holeWidth: 380,
  holeHeight: 250
}

const SHOW_DEBUG = false

/* =========================
   STATE
========================= */
const relayRoot = document.getElementById('relay-root')

const deepLayer = document.getElementById('deep-layer')
const backLayer = document.getElementById('back-layer')
const frontLayer = document.getElementById('front-layer')
   
let isPlaying = true
let isManualMode = true

let lastTime = performance.now()
let frameTimerMs = 0

let currentFrameIndex = 0

let warnedDepthMissing = false
let isFrameSwapInFlight = false

// 🎬 FRAME STATE (the real system now)
const frames = [
  { layer: frontLayer, scale: 1, imgIndex: 0 },
  { layer: backLayer,  scale: 0.6, imgIndex: 1 },
  { layer: deepLayer,  scale: 0.3, imgIndex: 2 }
]

const layerConfig = {
  front: { opacity: 1 },
  back:  { opacity: 1 },
  deep:  { opacity: 1 }
}

const layerControlDefs = [
  { key: 'opacity', label: 'opacity', min: 0, max: 1, step: 0.01 }
]

const layerControlUI = {
  front: {},
  back: {},
  deep: {}
}
// Handle missing images gracefully
backLayer.addEventListener('error', () => {
  if (!warnedDepthMissing) {
    console.warn('Back-layer frame failed to load.')
    warnedDepthMissing = true
  }

  if (frontAssets.length > 0) {
    backLayer.src = frontAssets[(currentFrameIndex + 1) % frontAssets.length]
  }
})

deepLayer.addEventListener('error', () => {
  if (frontAssets.length > 0) {
    deepLayer.src = frontAssets[(currentFrameIndex + 2) % frontAssets.length]
  }
})

// Simple load confirmation (no transforms, no hole logic)
frontLayer.addEventListener('load', () => {})
backLayer.addEventListener('load', () => {})
deepLayer.addEventListener('load', () => {})
   
function setLayerSource(layer, src, layerName) {
  const targetUrl = new URL(src, window.location.href).href

  return new Promise((resolve, reject) => {
    const current = layer.currentSrc || layer.src
    const currentUrl = current ? new URL(current, window.location.href).href : ''

    // If already loaded, do nothing
    if (currentUrl === targetUrl && layer.complete && layer.naturalWidth > 0) {
      resolve()
      return
    }

    let timeoutId = null

    const cleanup = () => {
      if (timeoutId !== null) {
        window.clearTimeout(timeoutId)
      }
      layer.removeEventListener('load', onLoad)
      layer.removeEventListener('error', onError)
    }

    const onLoad = () => {
      cleanup()
      resolve()
    }

    const onError = () => {
      cleanup()
      reject(new Error(`${layerName} failed to load: ${targetUrl}`))
    }

    layer.addEventListener('load', onLoad, { once: true })
    layer.addEventListener('error', onError, { once: true })

    timeoutId = window.setTimeout(() => {
      cleanup()
      reject(new Error(`${layerName} load timed out: ${targetUrl}`))
    }, 4000)

    layer.src = src
  })
}

   async function discoverFrameAssets() {
  const response = await fetch(`${FRONT_DIR}/__index__.json`)
  if (!response.ok) {
    throw new Error(`Failed to load asset index (${response.status})`)
  }

  const payload = await response.json()
  const files = Array.isArray(payload?.files) ? payload.files : []

  const pngFiles = files.filter(
    (name) => typeof name === 'string' && /\.png$/i.test(name)
  )

  if (pngFiles.length === 0) {
    throw new Error('No PNG files found in assets folder.')
  }

  frontAssets = pngFiles.map((name) => `${FRONT_DIR}/${name}`)
  depthAssets = frontAssets // same list for all frames

  currentFrameIndex = Math.max(
    0,
    Math.min(currentFrameIndex, frontAssets.length - 1)
  )
}



     




  





/* =========================
   UI
========================= */
const controlDefs = [
  { key: 'playbackFps', label: 'playback fps', min: 1, max: 30, step: 1 },
  { key: 'speed', label: 'zoom response', min: 0.02, max: 2, step: 0.01 },
  { key: 'pullStrength', label: 'pullStrength', min: 0.5, max: 10, step: 0.1 },
  { key: 'startDistance', label: 'startDistance', min: 0, max: 1, step: 0.01 },
  { key: 'arrivalThreshold', label: 'arrivalThreshold', min: 0.005, max: 0.1, step: 0.001 },
  { key: 'maxZoom', label: 'zoom floor', min: 1, max: 30, step: 0.1 },
  { key: 'feather', label: 'feather', min: 0, max: 100, step: 1 },
  { key: 'holeWidth', label: 'holeWidth', min: 50, max: 800, step: 1 },
  { key: 'holeHeight', label: 'holeHeight', min: 50, max: 800, step: 1 },
  { key: 'alphaThreshold1', label: 'alpha soft', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold2', label: 'alpha medium', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold3', label: 'alpha strict', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold4', label: 'alpha very strict', min: 1, max: 255, step: 1 },
  { key: 'holeMinArea', label: 'min hole pixels', min: 1, max: 20000, step: 1 }
]

function formatValue(v) {
  return Number(v).toFixed(Number(v) < 1 ? 3 : 2).replace(/\.00$/, '')
}

function createControls() {
  for (const def of controlDefs) {
    const row = document.createElement('div')
    row.className = 'control'

    const label = document.createElement('label')
    label.textContent = def.label

    const value = document.createElement('span')
    value.className = 'value'
    value.textContent = formatValue(config[def.key])

    const input = document.createElement('input')
    input.type = 'range'
    input.min = String(def.min)
    input.max = String(def.max)
    input.step = String(def.step)
    input.value = String(config[def.key])

    input.addEventListener('input', () => {
      const prevCenter = getHoleCenter()
      config[def.key] = Number(input.value)
      value.textContent = formatValue(config[def.key])

      if (def.key === 'holeWidth' || def.key === 'holeHeight') {
        hole.width = config.holeWidth
        hole.height = config.holeHeight
        // keep same center while resizing before pinning to local space
        hole.x = prevCenter.x - hole.width / 2
        hole.y = prevCenter.y - hole.height / 2
        syncRelayRootToHoleSize(true)
        resizeDebugCanvas()
        updatePatchLayerLayouts()
        return
      }

      if (def.key.startsWith('alphaThreshold') || def.key === 'holeMinArea') {
        frameAlphaHoleCache.clear()
        if (!applyHoleFromMetadata(currentFrameIndex)) {
          applyHoleFromImageAlpha(currentFrameIndex)
        }
      }
    })

    row.appendChild(label)
    row.appendChild(value)
    row.appendChild(input)
    controlsHost.appendChild(row)
  }

  createLayerControls('front', 'Front Layer')
  createLayerControls('back', 'Back Layer')
  createLayerControls('deep', 'Deep Layer')
}

function createLayerControls(layerKey, title) {
  const group = document.createElement('div')
  group.className = 'layer-group'

  const heading = document.createElement('h4')
  heading.className = 'layer-title'
  heading.textContent = title
  group.appendChild(heading)

  for (const def of layerControlDefs) {
    const row = document.createElement('div')
    row.className = 'control'

    const label = document.createElement('label')
    label.textContent = def.label

    const value = document.createElement('span')
    value.className = 'value'
    value.textContent = formatValue(layerConfig[layerKey][def.key])

    const input = document.createElement('input')
    input.type = 'range'
    input.min = String(def.min)
    input.max = String(def.max)
    input.step = String(def.step)
    input.value = String(layerConfig[layerKey][def.key])

    input.addEventListener('input', () => {
      layerConfig[layerKey][def.key] = Number(input.value)
      value.textContent = formatValue(layerConfig[layerKey][def.key])
      applyLayerVisualTweaks()
    })

    layerControlUI[layerKey][def.key] = { input, value }

    row.appendChild(label)
    row.appendChild(value)
    row.appendChild(input)
    group.appendChild(row)
  }

  controlsHost.appendChild(group)
}

function applyLayerVisualTweaks() {
  frontLayer.style.opacity = String(layerConfig.front.opacity)
  backLayer.style.opacity = String(layerConfig.back.opacity)
  deepLayer.style.opacity = String(layerConfig.deep.opacity)
}

function syncLayerControlUI(layerKey, key) {
  const ui = layerControlUI[layerKey][key]
  if (!ui) {
    return
  }
  ui.input.value = String(layerConfig[layerKey][key])
  ui.value.textContent = formatValue(layerConfig[layerKey][key])
}

function copyFrontToOtherLayers() {
  for (const targetKey of ['back', 'deep']) {
    for (const def of layerControlDefs) {
      layerConfig[targetKey][def.key] = layerConfig.front[def.key]
      syncLayerControlUI(targetKey, def.key)
    }
  }

  applyLayerVisualTweaks()
}

playBtn.onclick = () => {
  isPlaying = !isPlaying
  playBtn.textContent = isPlaying ? 'Pause' : 'Play'
}

function updatePlaybackModeUI() {
  manualModeBtn.textContent = isManualMode ? 'Mode: Manual' : 'Mode: Auto'
  nextFrameBtn.disabled = !isManualMode
}

manualModeBtn.onclick = () => {
  isManualMode = !isManualMode
  frameTimerMs = 0
  updatePlaybackModeUI()
}

nextFrameBtn.onclick = () => {
  if (!isManualMode || isFrameSwapInFlight) {
    return
  }
  void advanceImages()
}

copyFrontBtn.onclick = () => {
  copyFrontToOtherLayers()
}

/* =========================
   CORE UTILS (ZOOM LOOP)
========================= */

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v))
}

function lerp(a, b, t) {
  return a + (b - a) * t
}

function getViewportSize() {
  return {
    width: relayRoot.clientWidth,
    height: relayRoot.clientHeight
  }
}





/* =========================
   RENDER
========================= */
async function syncLayers() {
  if (frontAssets.length === 0 || depthAssets.length === 0) {
    return
  }

  // front keeps alpha cutout
  const backIndex = (currentFrameIndex + 1) % depthAssets.length
  const deepIndex = (currentFrameIndex + 2) % depthAssets.length

  // Show the second frame behind the hole immediately, even while layer loads are in flight.
  relayRoot.style.backgroundImage = USE_SECOND_FRAME_BACKGROUND
    ? `url(${depthAssets[backIndex]})`
    : 'none'

  await Promise.all([
    setLayerSource(frontLayer, frontAssets[currentFrameIndex], 'front-layer'),
    setLayerSource(backLayer, depthAssets[backIndex], 'back-layer'),
    setLayerSource(deepLayer, depthAssets[deepIndex], 'deep-layer')
  ])
}

async function advanceImages() {
  if (isFrameSwapInFlight || frontAssets.length === 0) {
    return
  }

  isFrameSwapInFlight = true
  currentFrameIndex = (currentFrameIndex + 1) % frontAssets.length
  if (!applyHoleFromMetadata(currentFrameIndex)) {
    applyHoleFromAlphaCache(currentFrameIndex)
  }
  resetCameraToFrameStart()
  try {
    await syncLayers()
  } catch (err) {
    console.warn(err)
  } finally {
    isFrameSwapInFlight = false
  }
}

function applySharedTransform() {
  const { tx, ty } = getSharedTransform()
  const holeCenter = getHoleCenter()

  const shared = `translate(${tx}px, ${ty}px) scale(${zoom})`
  const frontTransform = `${shared} translate(${layerConfig.front.offsetX}px, ${layerConfig.front.offsetY}px) scale(${layerConfig.front.scale})`
  const backTransform = `${shared} translate(${layerConfig.back.offsetX}px, ${layerConfig.back.offsetY}px) scale(${layerConfig.back.scale})`
  const deepTransform = `${shared} translate(${layerConfig.deep.offsetX}px, ${layerConfig.deep.offsetY}px) scale(${layerConfig.deep.scale})`

  deepLayer.style.transformOrigin = deepLayerIsPatch ? '50% 50%' : `${holeCenter.x}px ${holeCenter.y}px`
  backLayer.style.transformOrigin = backLayerIsPatch ? '50% 50%' : `${holeCenter.x}px ${holeCenter.y}px`
  frontLayer.style.transformOrigin = `${holeCenter.x}px ${holeCenter.y}px`

  deepLayer.style.transform = deepTransform
  backLayer.style.transform = backTransform
  frontLayer.style.transform = frontTransform
}

function applyFeatherMask() {
  frontLayer.style.maskImage = 'none'
  frontLayer.style.webkitMaskImage = 'none'
}

function resizeDebugCanvas() {
  const dpr = window.devicePixelRatio || 1
  const w = relayRoot.clientWidth
  const h = relayRoot.clientHeight
  debugCanvas.width = Math.floor(w * dpr)
  debugCanvas.height = Math.floor(h * dpr)
  debugCanvas.style.width = `${w}px`
  debugCanvas.style.height = `${h}px`
  debugCtx.setTransform(dpr, 0, 0, dpr, 0, 0)
}

function renderDebug() {
  if (!SHOW_DEBUG) {
    debugCtx.clearRect(0, 0, relayRoot.clientWidth, relayRoot.clientHeight)
    return
  }

  const w = relayRoot.clientWidth
  const h = relayRoot.clientHeight
  debugCtx.clearRect(0, 0, w, h)

  const screenHole = getScreenHoleRect()
  const holeCenterScreen = toScreenPoint(getHoleCenter())
  const cameraScreen = toScreenPoint(cameraPos)

  // hole rectangle
  debugCtx.strokeStyle = '#00e5ff'
  debugCtx.lineWidth = 1.5
  debugCtx.strokeRect(screenHole.x, screenHole.y, screenHole.width, screenHole.height)

  // hole center
  debugCtx.fillStyle = '#00e5ff'
  debugCtx.beginPath()
  debugCtx.arc(holeCenterScreen.x, holeCenterScreen.y, 4, 0, Math.PI * 2)
  debugCtx.fill()

  // camera position
  debugCtx.fillStyle = '#ff4d4d'
  debugCtx.beginPath()
  debugCtx.arc(cameraScreen.x, cameraScreen.y, 4, 0, Math.PI * 2)
  debugCtx.fill()

  // line from camera to hole
  debugCtx.strokeStyle = 'rgba(255,77,77,0.7)'
  debugCtx.beginPath()
  debugCtx.moveTo(cameraScreen.x, cameraScreen.y)
  debugCtx.lineTo(holeCenterScreen.x, holeCenterScreen.y)
  debugCtx.stroke()
}

/* =========================
   LOOP
========================= */
function animate(now) {
  const deltaMs = Math.max(0, now - lastTime)
  lastTime = now
  const deltaTime = deltaMs / 1000

  updateCamera(deltaTime)
  applySharedTransform()
  applyFeatherMask()

  if (isPlaying && !isManualMode) {
    frameTimerMs += deltaMs
    const frameDurationMs = 1000 / Math.max(1, config.playbackFps)
    if (frameTimerMs >= frameDurationMs && !isFrameSwapInFlight) {
      void advanceImages()
      frameTimerMs -= frameDurationMs
      frameTimerMs = Math.min(frameTimerMs, frameDurationMs)
    }
  }

  renderDebug()
  requestAnimationFrame(animate)
}

/* =========================
   INIT
========================= */
async function loadInitialImages() {
  if (frontAssets.length === 0) {
    return
  }

  updateSourceImageSize()
  if (!applyHoleFromMetadata(currentFrameIndex)) {
    applyHoleFromAlphaCache(currentFrameIndex)
  }
  await syncLayers()
}

function init() {
  mappingViewportSize = getViewportSize()
  createControls()
  applyLayerVisualTweaks()
  centerHoleInViewport()
  resizeDebugCanvas()
  debugCanvas.style.display = SHOW_DEBUG ? 'block' : 'none'
  updatePlaybackModeUI()

  discoverFrameAssets()
    .then(() => loadFrameMetadata())
    .catch((err) => {
      console.warn('Failed to load frame discovery index. Falling back to hole detection from PNG alpha.', err)
    })
    .finally(() => {
      loadInitialImages()
        .catch((err) => {
          console.warn('Initial layer load failed.', err)
        })
        .finally(() => {
          resetCameraToFrameStart()
          requestAnimationFrame(animate)
        })
    })
}

window.addEventListener('resize', () => {
  resizeDebugCanvas()
  syncRelayRootToHoleSize()
  updatePatchLayerLayouts()
})

init()
</script>

</body>
</html>
