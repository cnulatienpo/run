<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Player – Camera Through Hole</title>

<style>
/* =========================
   PAGE SETUP
========================= */
html, body {
  height: 100%;
  margin: 0;
  background: #16161600;
}

body {
  display: grid;
  place-items: center;
  overflow: hidden;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* =========================
   MAIN VIEWPORT (THE SCREEN)
========================= */
#relay-root {
  position: relative;
  width: min(96vw, 1600px);
  height: min(72vw, 1200px);
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background-color: #0d0d0d00;
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  border: 6px solid #f3f3f3;
  border-radius: 14px;
  box-shadow: 0 22px 50px rgba(0, 0, 0, 0.45);
}

/* =========================
   SHARED LAYERS
========================= */
#deep-layer,
#back-layer,
#front-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform-origin: center center;
  pointer-events: none;
  object-fit: cover;
}

#deep-layer {
  z-index: 0;
}

#back-layer {
  z-index: 1;
}

#front-layer {
  z-index: 2;
  background: none;
}

/* =========================
   DEBUG OVERLAY
========================= */
#debug-canvas {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* =========================
   UI PANEL
========================= */
#control-panel {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 50;
  width: 300px;
  max-height: calc(100vh - 24px);
  overflow-y: auto;
  padding: 10px;
  border-radius: 8px;
  background: rgba(35, 36, 34, 0.72);
  color: #eee;
  backdrop-filter: blur(4px);
}

#control-panel h3 {
  margin: 0 0 8px 0;
  font-size: 14px;
  font-weight: 600;
}

#playBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

#copyFrontBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

#manualModeBtn,
#nextFrameBtn {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px 10px;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
}

.control {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  align-items: center;
  margin: 6px 0;
}

.control input[type="range"] {
  grid-column: 1 / span 2;
  width: 100%;
}

.value {
  font-variant-numeric: tabular-nums;
  color: #9ad;
}

.layer-group {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid rgba(255, 255, 255, 0.25);
}

.layer-title {
  margin: 0 0 4px 0;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
</style>
</head>

<body>

<div id="relay-root">
  <img id="deep-layer" alt="Deep layer">
  <img id="back-layer" alt="Back layer">
  <img id="front-layer" alt="Front layer">
  <canvas id="debug-canvas"></canvas>
</div>

<div id="control-panel">
  <h3>Relay Controls</h3>
  <button id="playBtn">Pause</button>
  <button id="manualModeBtn">Mode: Auto</button>
  <button id="nextFrameBtn" disabled>Next Frame</button>
  <button id="copyFrontBtn">Copy Front -> Back + Deep</button>
  <div id="controls"></div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const FRONT_DIR = 'assets' // PNG frames now live directly under assets/
const DEPTH_DIR = 'assets' // using same source; back/deep are flattened to opaque at load time
const METADATA_DIR = 'assets/json_final'
const ENABLE_FRAME_METADATA = false
let frontAssets = []
let depthAssets = []

const config = {
  playbackFps: 6,        // lower default to avoid rapid looping on tiny frame sets
  speed: 0.35,            // zoom response (0.02 → 2)
  pullStrength: 4.0,      // 0.5 → 10
  startDistance: 0.8,     // 0 → 1 (kept live-configurable)
  arrivalThreshold: 0.03, // 0.005 → 0.1
  maxZoom: 8.0,           // minimum zoom ceiling; dynamic zoom can exceed this to pass through hole
  feather: 30,            // 0 → 100
  holeWidth: 380,         // 50 → 800
  holeHeight: 250,        // 50 → 800
  alphaThreshold1: 160,   // lower catches softer transparency
  alphaThreshold2: 200,
  alphaThreshold3: 230,
  alphaThreshold4: 245,   // higher catches near-transparent pixels
  holeMinArea: 16         // minimum connected transparent pixels
}

const SHOW_DEBUG = false
const USE_SECOND_FRAME_BACKGROUND = true
const HOLE_ALPHA_SCAN_MAX_DIMENSION = 640
const HOLE_ALPHA_MIN_COMPONENT_AREA = 1

/* =========================
   STATE
========================= */
const relayRoot = document.getElementById('relay-root')
const deepLayer = document.getElementById('deep-layer')
const backLayer = document.getElementById('back-layer')
const frontLayer = document.getElementById('front-layer')
const debugCanvas = document.getElementById('debug-canvas')
const debugCtx = debugCanvas.getContext('2d')
const controlsHost = document.getElementById('controls')
const playBtn = document.getElementById('playBtn')
const manualModeBtn = document.getElementById('manualModeBtn')
const nextFrameBtn = document.getElementById('nextFrameBtn')
const copyFrontBtn = document.getElementById('copyFrontBtn')
const alphaScanCanvas = document.createElement('canvas')
const alphaScanCtx = alphaScanCanvas.getContext('2d', { willReadFrequently: true })

let isPlaying = true
let isManualMode = false
let lastTime = performance.now()
let currentFrameIndex = 0
let frameTimerMs = 0

let hole = { x: 0, y: 0, width: config.holeWidth, height: config.holeHeight }
let cameraPos = { x: 0, y: 0 }
let zoom = 1
let frameStartMaxDistance = 1
const frameMetadata = new Map()
const frameAlphaHoleCache = new Map()
let sourceImageSize = { width: 0, height: 0 }
let backLayerIsPatch = false
let deepLayerIsPatch = false
let mappingViewportSize = null
let lockedRelayRootSize = null

let warnedDepthMissing = false
let isFrameSwapInFlight = false

const layerConfig = {
  front: { opacity: 1, scale: 1, offsetX: 0, offsetY: 0 },
  back: { opacity: 1, scale: 1, offsetX: 0, offsetY: 0 },
  deep: { opacity: 1, scale: 1, offsetX: 0, offsetY: 0 }
}

const layerControlDefs = [
  { key: 'opacity', label: 'opacity', min: 0, max: 1, step: 0.01 },
  { key: 'scale', label: 'scale', min: 0.5, max: 2, step: 0.01 },
  { key: 'offsetX', label: 'offsetX', min: -300, max: 300, step: 1 },
  { key: 'offsetY', label: 'offsetY', min: -300, max: 300, step: 1 }
]

const layerControlUI = {
  front: {},
  back: {},
  deep: {}
}

backLayer.addEventListener('error', () => {
  if (!warnedDepthMissing) {
    console.warn('Back-layer frame failed to load. Check DEPTH_DIR path.')
    warnedDepthMissing = true
  }
  if (frontAssets.length > 0) {
    backLayer.src = frontAssets[(currentFrameIndex + 1) % frontAssets.length]
  }
})

deepLayer.addEventListener('error', () => {
  if (frontAssets.length > 0) {
    deepLayer.src = frontAssets[(currentFrameIndex + 2) % frontAssets.length]
  }
})

backLayer.addEventListener('load', () => {
  updatePatchLayerLayouts()
  relayRoot.style.backgroundImage = USE_SECOND_FRAME_BACKGROUND
    ? `url(${backLayer.currentSrc || backLayer.src})`
    : 'none'
})

deepLayer.addEventListener('load', () => {
  updatePatchLayerLayouts()
})

frontLayer.addEventListener('load', () => {
  if (!updateSourceImageSize()) {
    return
  }
  if (!applyHoleFromMetadata(currentFrameIndex)) {
    applyHoleFromImageAlpha(currentFrameIndex)
  }
})

function setLayerSource(layer, src, layerName, flatten = false) {
  const targetUrl = new URL(src, window.location.href).href

  return new Promise((resolve, reject) => {
    const current = layer.currentSrc || layer.src
    const currentUrl = current ? new URL(current, window.location.href).href : ''

    if (currentUrl === targetUrl && layer.complete && layer.naturalWidth > 0) {
      resolve()
      return
    }

    let timeoutId = null

    const onLoad = () => {
      cleanup()
      resolve()
    }

    const onError = () => {
      cleanup()
      reject(new Error(`${layerName} failed to load: ${targetUrl}`))
    }

    const cleanup = () => {
      if (timeoutId !== null) {
        window.clearTimeout(timeoutId)
      }
      layer.removeEventListener('load', onLoad)
      layer.removeEventListener('error', onError)
    }

    layer.addEventListener('load', onLoad, { once: true })
    layer.addEventListener('error', onError, { once: true })
    timeoutId = window.setTimeout(() => {
      cleanup()
      reject(new Error(`${layerName} load timed out: ${targetUrl}`))
    }, 4000)

    // Avoid reassigning the exact same resolved URL, which may not emit load again.
    if (currentUrl !== targetUrl) {
      layer.src = src
      return
    }

    if (layer.complete && layer.naturalWidth > 0) {
      cleanup()
      resolve()
      return
    }

    layer.src = src
  })
}

function metadataPathForAsset(assetPath) {
  const fileName = assetPath.split('/').pop() || ''
  const stem = fileName.replace(/\.[^.]+$/, '')
  return `${METADATA_DIR}/${stem}.json`
}

async function discoverFrameAssets() {
  const response = await fetch(`${FRONT_DIR}/__index__.json`)
  if (!response.ok) {
    throw new Error(`Failed to load asset index (${response.status})`)
  }

  const payload = await response.json()
  const files = Array.isArray(payload?.files) ? payload.files : []
  const pngFiles = files.filter((name) => typeof name === 'string' && /\.png$/i.test(name))

  if (pngFiles.length === 0) {
    throw new Error('No PNG files found in assets folder.')
  }

  frontAssets = pngFiles.map((name) => `${FRONT_DIR}/${name}`)
  depthAssets = pngFiles.map((name) => `${DEPTH_DIR}/${name}`)
  currentFrameIndex = clamp(currentFrameIndex, 0, frontAssets.length - 1)
  frameMetadata.clear()
  frameAlphaHoleCache.clear()
}

function getHoleAlphaThresholds() {
  return Array.from(new Set([
    config.alphaThreshold1,
    config.alphaThreshold2,
    config.alphaThreshold3,
    config.alphaThreshold4
  ].map((value) => clamp(Math.round(Number(value) || 1), 1, 255)))).sort((a, b) => a - b)
}

function chooseScanSize(sourceWidth, sourceHeight) {
  const longest = Math.max(sourceWidth, sourceHeight)
  if (longest <= HOLE_ALPHA_SCAN_MAX_DIMENSION) {
    return {
      width: sourceWidth,
      height: sourceHeight
    }
  }

  const scale = HOLE_ALPHA_SCAN_MAX_DIMENSION / longest
  return {
    width: Math.max(1, Math.round(sourceWidth * scale)),
    height: Math.max(1, Math.round(sourceHeight * scale))
  }
}

function findHoleBBoxInAlpha(data, width, height, alphaThreshold, minArea) {
  const visited = new Uint8Array(width * height)
  const centerX = width / 2
  const centerY = height / 2
  let best = null

  const stack = []
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const seed = y * width + x
      if (visited[seed]) {
        continue
      }

      visited[seed] = 1
      if (data[seed * 4 + 3] > alphaThreshold) {
        continue
      }

      let area = 0
      let minX = x
      let maxX = x
      let minY = y
      let maxY = y
      let sumX = 0
      let sumY = 0
      let touchesBorder = x === 0 || y === 0 || x === width - 1 || y === height - 1

      stack.push(seed)
      while (stack.length > 0) {
        const idx = stack.pop()
        const cx = idx % width
        const cy = (idx - cx) / width

        area += 1
        sumX += cx
        sumY += cy
        if (cx < minX) minX = cx
        if (cx > maxX) maxX = cx
        if (cy < minY) minY = cy
        if (cy > maxY) maxY = cy
        if (cx === 0 || cy === 0 || cx === width - 1 || cy === height - 1) {
          touchesBorder = true
        }

        const neighbors = [idx - 1, idx + 1, idx - width, idx + width]
        for (const n of neighbors) {
          if (n < 0 || n >= width * height || visited[n]) {
            continue
          }

          const nx = n % width
          const ny = (n - nx) / width
          if (Math.abs(nx - cx) + Math.abs(ny - cy) !== 1) {
            continue
          }

          visited[n] = 1
          if (data[n * 4 + 3] <= alphaThreshold) {
            stack.push(n)
          }
        }
      }

      if (touchesBorder || area < minArea) {
        continue
      }

      const centroidX = sumX / area
      const centroidY = sumY / area
      const distToCenterSq = ((centroidX - centerX) ** 2) + ((centroidY - centerY) ** 2)
      const score = area - distToCenterSq * 0.01

      if (!best || score > best.score) {
        best = {
          x1: minX,
          y1: minY,
          x2: maxX + 1,
          y2: maxY + 1,
          score
        }
      }
    }
  }

  return best
}

function applyHoleFromSourceBBox(sourceBox) {
  const mapped = mapSourceRectToViewport({
    x: sourceBox.x,
    y: sourceBox.y,
    width: sourceBox.width,
    height: sourceBox.height
  })

  hole.x = mapped.x
  hole.y = mapped.y
  hole.width = mapped.width
  hole.height = mapped.height
  syncRelayRootToHoleSize(false)
  resizeDebugCanvas()
  updatePatchLayerLayouts()
}

function applyHoleFromImageAlpha(frameIndex) {
  const cached = frameAlphaHoleCache.get(frameIndex)
  if (cached) {
    applyHoleFromSourceBBox(cached)
    return true
  }

  if (!alphaScanCtx || !frontLayer.complete || frontLayer.naturalWidth <= 0 || frontLayer.naturalHeight <= 0) {
    return false
  }

  const sourceWidth = frontLayer.naturalWidth
  const sourceHeight = frontLayer.naturalHeight
  const scanSize = chooseScanSize(sourceWidth, sourceHeight)
  alphaScanCanvas.width = scanSize.width
  alphaScanCanvas.height = scanSize.height
  alphaScanCtx.clearRect(0, 0, scanSize.width, scanSize.height)
  alphaScanCtx.drawImage(frontLayer, 0, 0, scanSize.width, scanSize.height)

  const imageData = alphaScanCtx.getImageData(0, 0, scanSize.width, scanSize.height)
  const scanArea = scanSize.width * scanSize.height
  const minArea = Math.max(
    HOLE_ALPHA_MIN_COMPONENT_AREA,
    Math.round(config.holeMinArea),
    Math.floor(scanArea * 0.0002)
  )

  let bestScanBox = null
  for (const threshold of getHoleAlphaThresholds()) {
    const found = findHoleBBoxInAlpha(imageData.data, scanSize.width, scanSize.height, threshold, minArea)
    if (found) {
      bestScanBox = found
      break
    }
  }

  if (!bestScanBox) {
    return false
  }

  const scaleX = sourceWidth / scanSize.width
  const scaleY = sourceHeight / scanSize.height
  const sourceBox = {
    x: Math.max(0, Math.floor(bestScanBox.x1 * scaleX)),
    y: Math.max(0, Math.floor(bestScanBox.y1 * scaleY)),
    width: Math.max(1, Math.ceil((bestScanBox.x2 - bestScanBox.x1) * scaleX)),
    height: Math.max(1, Math.ceil((bestScanBox.y2 - bestScanBox.y1) * scaleY))
  }

  frameAlphaHoleCache.set(frameIndex, sourceBox)
  applyHoleFromSourceBBox(sourceBox)
  return true
}

function applyHoleFromAlphaCache(frameIndex) {
  const cached = frameAlphaHoleCache.get(frameIndex)
  if (!cached) {
    return false
  }
  applyHoleFromSourceBBox(cached)
  return true
}

function updateSourceImageSize() {
  const w = frontLayer.naturalWidth
  const h = frontLayer.naturalHeight
  if (w > 0 && h > 0) {
    sourceImageSize = { width: w, height: h }
    return true
  }
  return false
}

function mapSourceRectToViewport(rect) {
  const viewport = mappingViewportSize || getViewportSize()
  const srcW = sourceImageSize.width
  const srcH = sourceImageSize.height

  if (srcW <= 0 || srcH <= 0) {
    return rect
  }

  // Match <img object-fit: cover> mapping from source image pixels to viewport pixels.
  const scale = Math.max(viewport.width / srcW, viewport.height / srcH)
  const renderedW = srcW * scale
  const renderedH = srcH * scale
  const offsetX = (viewport.width - renderedW) / 2
  const offsetY = (viewport.height - renderedH) / 2

  return {
    x: rect.x * scale + offsetX,
    y: rect.y * scale + offsetY,
    width: rect.width * scale,
    height: rect.height * scale
  }
}

function syncRelayRootToHoleSize(forceFromHole = false) {
  const viewport = getViewportSize()
  if (viewport.width <= 0 || viewport.height <= 0) {
    return
  }

  if (forceFromHole || !lockedRelayRootSize) {
    lockedRelayRootSize = {
      width: viewport.width,
      height: viewport.height
    }
  }

  hole.width = clamp(hole.width, 1, viewport.width)
  hole.height = clamp(hole.height, 1, viewport.height)
  hole.x = clamp(hole.x, 0, viewport.width - hole.width)
  hole.y = clamp(hole.y, 0, viewport.height - hole.height)
}

function updatePatchLayerLayouts() {
  backLayerIsPatch = true
  deepLayerIsPatch = true

  const left = `${Math.round(hole.x)}px`
  const top = `${Math.round(hole.y)}px`
  const width = `${Math.max(1, Math.round(hole.width))}px`
  const height = `${Math.max(1, Math.round(hole.height))}px`

  backLayer.style.inset = 'auto'
  backLayer.style.left = left
  backLayer.style.top = top
  backLayer.style.width = width
  backLayer.style.height = height
  backLayer.style.objectFit = 'cover'

  deepLayer.style.inset = 'auto'
  deepLayer.style.left = left
  deepLayer.style.top = top
  deepLayer.style.width = width
  deepLayer.style.height = height
  deepLayer.style.objectFit = 'cover'
}

function applyHoleFromMetadata(frameIndex) {
  const meta = frameMetadata.get(frameIndex)
  if (!meta || !meta.has_mask || !Array.isArray(meta.bbox) || meta.bbox.length !== 4) {
    return false
  }

  const [x1, y1, x2, y2] = meta.bbox.map(Number)
  if ([x1, y1, x2, y2].some((v) => Number.isNaN(v))) {
    return false
  }

  applyHoleFromSourceBBox({
    x: x1,
    y: y1,
    width: Math.max(1, x2 - x1),
    height: Math.max(1, y2 - y1)
  })
  return true
}

async function loadFrameMetadata() {
  if (!ENABLE_FRAME_METADATA || frontAssets.length === 0) {
    return
  }

  const requests = frontAssets.map(async (assetPath, i) => {
    const response = await fetch(metadataPathForAsset(assetPath))
    if (!response.ok) {
      return null
    }
    const payload = await response.json()
    return [i, payload]
  })

  const entries = await Promise.allSettled(requests)
  for (const entry of entries) {
    if (entry.status !== 'fulfilled' || !entry.value) {
      continue
    }
    const [idx, payload] = entry.value
    frameMetadata.set(idx, payload)
  }

  if (frameMetadata.size > 0) {
    applyHoleFromMetadata(currentFrameIndex)
    return
  }

  console.warn('Frame metadata not found. Falling back to hole detection from PNG alpha.')
}

/* =========================
   UI
========================= */
const controlDefs = [
  { key: 'playbackFps', label: 'playback fps', min: 1, max: 30, step: 1 },
  { key: 'speed', label: 'zoom response', min: 0.02, max: 2, step: 0.01 },
  { key: 'pullStrength', label: 'pullStrength', min: 0.5, max: 10, step: 0.1 },
  { key: 'startDistance', label: 'startDistance', min: 0, max: 1, step: 0.01 },
  { key: 'arrivalThreshold', label: 'arrivalThreshold', min: 0.005, max: 0.1, step: 0.001 },
  { key: 'maxZoom', label: 'zoom floor', min: 1, max: 30, step: 0.1 },
  { key: 'feather', label: 'feather', min: 0, max: 100, step: 1 },
  { key: 'holeWidth', label: 'holeWidth', min: 50, max: 800, step: 1 },
  { key: 'holeHeight', label: 'holeHeight', min: 50, max: 800, step: 1 },
  { key: 'alphaThreshold1', label: 'alpha soft', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold2', label: 'alpha medium', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold3', label: 'alpha strict', min: 1, max: 255, step: 1 },
  { key: 'alphaThreshold4', label: 'alpha very strict', min: 1, max: 255, step: 1 },
  { key: 'holeMinArea', label: 'min hole pixels', min: 1, max: 20000, step: 1 }
]

function formatValue(v) {
  return Number(v).toFixed(Number(v) < 1 ? 3 : 2).replace(/\.00$/, '')
}

function createControls() {
  for (const def of controlDefs) {
    const row = document.createElement('div')
    row.className = 'control'

    const label = document.createElement('label')
    label.textContent = def.label

    const value = document.createElement('span')
    value.className = 'value'
    value.textContent = formatValue(config[def.key])

    const input = document.createElement('input')
    input.type = 'range'
    input.min = String(def.min)
    input.max = String(def.max)
    input.step = String(def.step)
    input.value = String(config[def.key])

    input.addEventListener('input', () => {
      const prevCenter = getHoleCenter()
      config[def.key] = Number(input.value)
      value.textContent = formatValue(config[def.key])

      if (def.key === 'holeWidth' || def.key === 'holeHeight') {
        hole.width = config.holeWidth
        hole.height = config.holeHeight
        // keep same center while resizing before pinning to local space
        hole.x = prevCenter.x - hole.width / 2
        hole.y = prevCenter.y - hole.height / 2
        syncRelayRootToHoleSize(true)
        resizeDebugCanvas()
        updatePatchLayerLayouts()
        return
      }

      if (def.key.startsWith('alphaThreshold') || def.key === 'holeMinArea') {
        frameAlphaHoleCache.clear()
        if (!applyHoleFromMetadata(currentFrameIndex)) {
          applyHoleFromImageAlpha(currentFrameIndex)
        }
      }
    })

    row.appendChild(label)
    row.appendChild(value)
    row.appendChild(input)
    controlsHost.appendChild(row)
  }

  createLayerControls('front', 'Front Layer')
  createLayerControls('back', 'Back Layer')
  createLayerControls('deep', 'Deep Layer')
}

function createLayerControls(layerKey, title) {
  const group = document.createElement('div')
  group.className = 'layer-group'

  const heading = document.createElement('h4')
  heading.className = 'layer-title'
  heading.textContent = title
  group.appendChild(heading)

  for (const def of layerControlDefs) {
    const row = document.createElement('div')
    row.className = 'control'

    const label = document.createElement('label')
    label.textContent = def.label

    const value = document.createElement('span')
    value.className = 'value'
    value.textContent = formatValue(layerConfig[layerKey][def.key])

    const input = document.createElement('input')
    input.type = 'range'
    input.min = String(def.min)
    input.max = String(def.max)
    input.step = String(def.step)
    input.value = String(layerConfig[layerKey][def.key])

    input.addEventListener('input', () => {
      layerConfig[layerKey][def.key] = Number(input.value)
      value.textContent = formatValue(layerConfig[layerKey][def.key])
      applyLayerVisualTweaks()
    })

    layerControlUI[layerKey][def.key] = { input, value }

    row.appendChild(label)
    row.appendChild(value)
    row.appendChild(input)
    group.appendChild(row)
  }

  controlsHost.appendChild(group)
}

function applyLayerVisualTweaks() {
  frontLayer.style.opacity = String(layerConfig.front.opacity)
  backLayer.style.opacity = String(layerConfig.back.opacity)
  deepLayer.style.opacity = String(layerConfig.deep.opacity)
}

function syncLayerControlUI(layerKey, key) {
  const ui = layerControlUI[layerKey][key]
  if (!ui) {
    return
  }
  ui.input.value = String(layerConfig[layerKey][key])
  ui.value.textContent = formatValue(layerConfig[layerKey][key])
}

function copyFrontToOtherLayers() {
  for (const targetKey of ['back', 'deep']) {
    for (const def of layerControlDefs) {
      layerConfig[targetKey][def.key] = layerConfig.front[def.key]
      syncLayerControlUI(targetKey, def.key)
    }
  }

  applyLayerVisualTweaks()
}

playBtn.onclick = () => {
  isPlaying = !isPlaying
  playBtn.textContent = isPlaying ? 'Pause' : 'Play'
}

function updatePlaybackModeUI() {
  manualModeBtn.textContent = isManualMode ? 'Mode: Manual' : 'Mode: Auto'
  nextFrameBtn.disabled = !isManualMode
}

manualModeBtn.onclick = () => {
  isManualMode = !isManualMode
  frameTimerMs = 0
  updatePlaybackModeUI()
}

nextFrameBtn.onclick = () => {
  if (!isManualMode || isFrameSwapInFlight) {
    return
  }
  void advanceImages()
}

copyFrontBtn.onclick = () => {
  copyFrontToOtherLayers()
}

/* =========================
   CAMERA
========================= */
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v))
}

function lerp(a, b, t) {
  return a + (b - a) * t
}

function distance(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y)
}

function getViewportSize() {
  return {
    width: relayRoot.clientWidth,
    height: relayRoot.clientHeight
  }
}

function getViewportCenter() {
  const v = getViewportSize()
  return { x: v.width / 2, y: v.height / 2 }
}

function getHoleCenter() {
  return {
    x: hole.x + hole.width / 2,
    y: hole.y + hole.height / 2
  }
}

function getSharedTransform() {
  const center = getViewportCenter()
  return {
    tx: center.x - cameraPos.x,
    ty: center.y - cameraPos.y
  }
}

function toScreenPoint(point) {
  const holeCenter = getHoleCenter()
  const { tx, ty } = getSharedTransform()
  return {
    x: (point.x - holeCenter.x) * zoom + holeCenter.x + tx,
    y: (point.y - holeCenter.y) * zoom + holeCenter.y + ty
  }
}

function getScreenHoleRect() {
  const topLeft = toScreenPoint({ x: hole.x, y: hole.y })
  return {
    x: topLeft.x,
    y: topLeft.y,
    width: hole.width * zoom,
    height: hole.height * zoom
  }
}

function centerHoleInViewport() {
  hole.width = config.holeWidth
  hole.height = config.holeHeight
  hole.x = 0
  hole.y = 0
  syncRelayRootToHoleSize(true)
}

// STEP 5 requested reset
function resetCameraToFrameStart() {
  const holeCenter = getHoleCenter()
  const viewportCenter = getViewportCenter()

  cameraPos = {
    x: viewportCenter.x,
    y: viewportCenter.y
  }

  const startDistance = distance(cameraPos, holeCenter)
  frameStartMaxDistance = Math.max(1, startDistance)
  zoom = 1
}

function updateCamera(deltaTime) {
  const holeCenter = getHoleCenter()

  // movement
  const t = Math.min(1, config.pullStrength * deltaTime)
  cameraPos = {
    x: lerp(cameraPos.x, holeCenter.x, t),
    y: lerp(cameraPos.y, holeCenter.y, t)
  }

  // zoom by proximity (STEP 4)
  const dist = distance(cameraPos, holeCenter)
  const proximity = clamp(1 - dist / frameStartMaxDistance, 0, 1)
  const viewport = getViewportSize()
  const fitZoom = Math.max(
    viewport.width / Math.max(1, hole.width),
    viewport.height / Math.max(1, hole.height)
  )
  // Push beyond hole-fit so the camera appears to move through the hole.
  const throughHoleZoom = Math.max(config.maxZoom, fitZoom * 1.25)
  const targetZoom = lerp(1, throughHoleZoom, proximity)
  const zoomLerpT = 1 - Math.exp(-config.speed * 60 * deltaTime)
  zoom = lerp(zoom, targetZoom, zoomLerpT)
}

/* =========================
   RENDER
========================= */
async function syncLayers() {
  if (frontAssets.length === 0 || depthAssets.length === 0) {
    return
  }

  // front keeps alpha cutout
  const backIndex = (currentFrameIndex + 1) % depthAssets.length
  const deepIndex = (currentFrameIndex + 2) % depthAssets.length

  // Show the second frame behind the hole immediately, even while layer loads are in flight.
  relayRoot.style.backgroundImage = USE_SECOND_FRAME_BACKGROUND
    ? `url(${depthAssets[backIndex]})`
    : 'none'

  await Promise.all([
    setLayerSource(frontLayer, frontAssets[currentFrameIndex], 'front-layer'),
    setLayerSource(backLayer, depthAssets[backIndex], 'back-layer'),
    setLayerSource(deepLayer, depthAssets[deepIndex], 'deep-layer')
  ])
}

async function advanceImages() {
  if (isFrameSwapInFlight || frontAssets.length === 0) {
    return
  }

  isFrameSwapInFlight = true
  currentFrameIndex = (currentFrameIndex + 1) % frontAssets.length
  if (!applyHoleFromMetadata(currentFrameIndex)) {
    applyHoleFromAlphaCache(currentFrameIndex)
  }
  resetCameraToFrameStart()
  try {
    await syncLayers()
  } catch (err) {
    console.warn(err)
  } finally {
    isFrameSwapInFlight = false
  }
}

function applySharedTransform() {
  const { tx, ty } = getSharedTransform()
  const holeCenter = getHoleCenter()

  const shared = `translate(${tx}px, ${ty}px) scale(${zoom})`
  const frontTransform = `${shared} translate(${layerConfig.front.offsetX}px, ${layerConfig.front.offsetY}px) scale(${layerConfig.front.scale})`
  const backTransform = `${shared} translate(${layerConfig.back.offsetX}px, ${layerConfig.back.offsetY}px) scale(${layerConfig.back.scale})`
  const deepTransform = `${shared} translate(${layerConfig.deep.offsetX}px, ${layerConfig.deep.offsetY}px) scale(${layerConfig.deep.scale})`

  deepLayer.style.transformOrigin = deepLayerIsPatch ? '50% 50%' : `${holeCenter.x}px ${holeCenter.y}px`
  backLayer.style.transformOrigin = backLayerIsPatch ? '50% 50%' : `${holeCenter.x}px ${holeCenter.y}px`
  frontLayer.style.transformOrigin = `${holeCenter.x}px ${holeCenter.y}px`

  deepLayer.style.transform = deepTransform
  backLayer.style.transform = backTransform
  frontLayer.style.transform = frontTransform
}

function applyFeatherMask() {
  frontLayer.style.maskImage = 'none'
  frontLayer.style.webkitMaskImage = 'none'
}

function resizeDebugCanvas() {
  const dpr = window.devicePixelRatio || 1
  const w = relayRoot.clientWidth
  const h = relayRoot.clientHeight
  debugCanvas.width = Math.floor(w * dpr)
  debugCanvas.height = Math.floor(h * dpr)
  debugCanvas.style.width = `${w}px`
  debugCanvas.style.height = `${h}px`
  debugCtx.setTransform(dpr, 0, 0, dpr, 0, 0)
}

function renderDebug() {
  if (!SHOW_DEBUG) {
    debugCtx.clearRect(0, 0, relayRoot.clientWidth, relayRoot.clientHeight)
    return
  }

  const w = relayRoot.clientWidth
  const h = relayRoot.clientHeight
  debugCtx.clearRect(0, 0, w, h)

  const screenHole = getScreenHoleRect()
  const holeCenterScreen = toScreenPoint(getHoleCenter())
  const cameraScreen = toScreenPoint(cameraPos)

  // hole rectangle
  debugCtx.strokeStyle = '#00e5ff'
  debugCtx.lineWidth = 1.5
  debugCtx.strokeRect(screenHole.x, screenHole.y, screenHole.width, screenHole.height)

  // hole center
  debugCtx.fillStyle = '#00e5ff'
  debugCtx.beginPath()
  debugCtx.arc(holeCenterScreen.x, holeCenterScreen.y, 4, 0, Math.PI * 2)
  debugCtx.fill()

  // camera position
  debugCtx.fillStyle = '#ff4d4d'
  debugCtx.beginPath()
  debugCtx.arc(cameraScreen.x, cameraScreen.y, 4, 0, Math.PI * 2)
  debugCtx.fill()

  // line from camera to hole
  debugCtx.strokeStyle = 'rgba(255,77,77,0.7)'
  debugCtx.beginPath()
  debugCtx.moveTo(cameraScreen.x, cameraScreen.y)
  debugCtx.lineTo(holeCenterScreen.x, holeCenterScreen.y)
  debugCtx.stroke()
}

/* =========================
   LOOP
========================= */
function animate(now) {
  const deltaMs = Math.max(0, now - lastTime)
  lastTime = now
  const deltaTime = deltaMs / 1000

  updateCamera(deltaTime)
  applySharedTransform()
  applyFeatherMask()

  if (isPlaying && !isManualMode) {
    frameTimerMs += deltaMs
    const frameDurationMs = 1000 / Math.max(1, config.playbackFps)
    if (frameTimerMs >= frameDurationMs && !isFrameSwapInFlight) {
      void advanceImages()
      frameTimerMs -= frameDurationMs
      frameTimerMs = Math.min(frameTimerMs, frameDurationMs)
    }
  }

  renderDebug()
  requestAnimationFrame(animate)
}

/* =========================
   INIT
========================= */
async function loadInitialImages() {
  if (frontAssets.length === 0) {
    return
  }

  updateSourceImageSize()
  if (!applyHoleFromMetadata(currentFrameIndex)) {
    applyHoleFromAlphaCache(currentFrameIndex)
  }
  await syncLayers()
}

function init() {
  mappingViewportSize = getViewportSize()
  createControls()
  applyLayerVisualTweaks()
  centerHoleInViewport()
  resizeDebugCanvas()
  debugCanvas.style.display = SHOW_DEBUG ? 'block' : 'none'
  updatePlaybackModeUI()

  discoverFrameAssets()
    .then(() => loadFrameMetadata())
    .catch((err) => {
      console.warn('Failed to load frame discovery index. Falling back to hole detection from PNG alpha.', err)
    })
    .finally(() => {
      loadInitialImages()
        .catch((err) => {
          console.warn('Initial layer load failed.', err)
        })
        .finally(() => {
          resetCameraToFrameStart()
          requestAnimationFrame(animate)
        })
    })
}

window.addEventListener('resize', () => {
  resizeDebugCanvas()
  syncRelayRootToHoleSize()
  updatePatchLayerLayouts()
})

init()
</script>
