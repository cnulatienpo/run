<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Player Baseline Restore</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      font-family: monospace;
    }

    #relay-root {
      position: relative;
      width: min(100vw, 100vh * 4 / 3);
      height: min(100vh, 100vw * 3 / 4);
      overflow: hidden;
      background: #000;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform-origin: center center;
      will-change: transform;
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
      background: transparent;
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #fff;
      background: rgba(0,0,0,0.65);
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-line;
      max-width: min(90vw, 560px);
    }

    #fail {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      color: #fff;
      background: #900;
      font-size: 24px;
      letter-spacing: 1px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="relay-root">
    <img id="layer-a" class="layer" alt="Relay layer A" />
    <img id="layer-b" class="layer" alt="Relay layer B" />
    <div id="fail">FAILED TO LOAD IMAGE</div>
  </div>
  <div id="status">starting…</div>

  <script>
    /*
      BASELINE RESTORE
      ----------------
      - two real <img> elements only
      - no fake squares
      - no canvas
      - no CSS masking
      - no giant dev panel
      - simple relay motion

      If your files are in a different folder, change CANDIDATE_BASES below.
    */

    const NUM_FRAMES = 100;
    const PAD = 4;
    const FRONT_SCALE_MIN = 1;
    const FRONT_SCALE_MAX = 2.4;
    const FRONT_SCALE_SPEED = 0.02;

    const CANDIDATE_BASES = [
      "assets/final_rgba",
      "./assets/final_rgba",
      "assets/pngs/final_rgba",
      "./assets/pngs/final_rgba"
    ];

    const fail = document.getElementById("fail");
    const statusEl = document.getElementById("status");

    let frontLayer = document.getElementById("layer-a");
    let backLayer = document.getElementById("layer-b");

    frontLayer.style.zIndex = "2";
    backLayer.style.zIndex = "1";

    let resolvedBase = null;
    let frontIndex = 0;
    let backIndex = 1;
    let frontScale = FRONT_SCALE_MIN;
    let animating = false;

    function frameName(i) {
      return `f_${String(i).padStart(PAD, "0")}.png`;
    }

    function framePath(base, i) {
      return `${base}/${frameName(i)}`;
    }

    function setStatus(extra = "") {
      statusEl.textContent =
        `base: ${resolvedBase ?? "resolving..."}\n` +
        `frontIndex: ${frontIndex}\n` +
        `backIndex: ${backIndex}\n` +
        `frontSrc: ${frontLayer.getAttribute("src") || "(none)"}\n` +
        `backSrc: ${backLayer.getAttribute("src") || "(none)"}\n` +
        extra;
    }

    function probeImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ ok: true, url, width: img.naturalWidth, height: img.naturalHeight });
        img.onerror = () => resolve({ ok: false, url });
        img.src = url;
      });
    }

    async function resolveBasePath() {
      const probes = [];
      for (const base of CANDIDATE_BASES) {
        probes.push(framePath(base, 0));
        probes.push(framePath(base, 1));
      }

      for (const url of probes) {
        const result = await probeImage(url);
        console.log("PROBE:", result.url, result.ok ? "OK" : "FAIL");
        if (result.ok) {
          const parts = result.url.split("/");
          parts.pop();
          return parts.join("/");
        }
      }
      return null;
    }

    function loadInto(img, index) {
      return new Promise((resolve, reject) => {
        const path = framePath(resolvedBase, index);
        console.log("LOADING:", path);
        img.onload = () => {
          console.log("LOADED:", path, img.naturalWidth, img.naturalHeight);
          img.style.display = "block";
          fail.style.display = "none";
          resolve(path);
        };
        img.onerror = () => {
          console.error("FAILED:", path);
          fail.style.display = "grid";
          reject(new Error(`Failed to load ${path}`));
        };
        img.src = path;
      });
    }

    function resetTransforms() {
      frontLayer.style.transform = `scale(${frontScale})`;
      backLayer.style.transform = "scale(1)";
    }

    function swapLayers() {
      [frontLayer, backLayer] = [backLayer, frontLayer];
      frontLayer.style.zIndex = "2";
      backLayer.style.zIndex = "1";
    }

    async function advance() {
      if (animating) return;
      animating = true;

      backIndex = (frontIndex + 1) % NUM_FRAMES;

      try {
        await loadInto(backLayer, backIndex);
      } catch (err) {
        setStatus("error: " + err.message);
        animating = false;
        return;
      }

      frontScale = FRONT_SCALE_MIN;
      resetTransforms();

      function tick() {
        frontScale += FRONT_SCALE_SPEED;
        frontLayer.style.transform = `scale(${frontScale})`;

        if (frontScale >= FRONT_SCALE_MAX) {
          frontIndex = backIndex;
          swapLayers();
          resetTransforms();
          setStatus("swap complete");
          animating = false;
          requestAnimationFrame(advance);
          return;
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    async function start() {
      resolvedBase = await resolveBasePath();

      if (!resolvedBase) {
        fail.style.display = "grid";
        setStatus("Could not find image folder.\nCheck CANDIDATE_BASES in the script.");
        return;
      }

      try {
        await loadInto(frontLayer, frontIndex);
        await loadInto(backLayer, backIndex);
      } catch (err) {
        setStatus("startup error: " + err.message);
        return;
      }

      setStatus("baseline relay running");
      resetTransforms();
      requestAnimationFrame(advance);
    }

    start();
  </script>
</body>
</html>
