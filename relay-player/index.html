<html lang="en">
<head>
<meta charset="UTF-8">

<style>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG Loader Test</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      font-family: monospace;
    }
    #img {
      max-width: 80vw;
      max-height: 80vh;
      border: 4px solid lime;
      margin-bottom: 2rem;
      background: #222;
      display: block;
    }
    #status {
      font-size: 1.5rem;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 0.5em 1em;
      border-radius: 8px;
      position: fixed;
      bottom: 24px;
      left: 24px;
    }
  </style>
</head>

<body>

<div id="relay-root">
  <!-- BACK IMAGE -->
  <img id="back-layer">
  <!-- FRONT IMAGE -->
  <img id="front-layer">
</div>

<script>

/* =========================
   ACTORS (YOUR STORY)
========================= */

// Cameraman (controls movement)
const frontLayer = document.getElementById('front-layer')

// Next world (behind)
const backLayer = document.getElementById('back-layer')

// Stage
const relayRoot = document.getElementById('relay-root')


/* =========================
   FOREMAN (LOADS FILES)
========================= */

const NUM_FRAMES = 60

// ⚠️ FIXED PATH (NO relay-player PREFIX)
const assets = Array.from({ length: NUM_FRAMES }, (_, i) =>
  `assets/pngs/final_rgba/f_${String(i).padStart(4, '0')}.png`
)


/* =========================
   SURVEY GUY (FINDS HOLE)
========================= */

// hardcoded for now
const hole = {
  x: 260,
  y: 165,
  width: 380,
  height: 250
}

// calculate center of hole
function getHoleCenter() {
  return {
    x: hole.x + hole.width / 2,
    y: hole.y + hole.height / 2
  }
}


/* =========================
   CAMERA SETTINGS
========================= */

let scale = 1
const SPEED = 0.01
const MAX_SCALE = 2.5
let startDistance = 0.8     // how close camera starts toward hole (0–1)
let pullStrength = 4.0      // speed toward hole
let arrivalThreshold = 0.03 // distance to trigger frame swap

let cameraPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 }
let lastTime = performance.now()

let index = 0
let frontIndex = 0;
let backIndex = 1;
const totalFrames = NUM_FRAMES;

function loadInitialImages() {
  frontLayer.src = assets[frontIndex];
  backLayer.src = assets[backIndex];
}

function advanceImages() {
  frontIndex = (frontIndex + 1) % totalFrames;
  backIndex = (backIndex + 1) % totalFrames;
  frontLayer.src = backLayer.src;
  backLayer.src = assets[backIndex];
}

/* =========================
   LOAD IMAGE
========================= */

function loadNextImage() {
  const path = assets[index]
  console.log("LOADING:", path)
  backLayer.src = path
  index++
  if (index >= assets.length) index = 0
}

function alignBackToHole() {
  const center = getHoleCenter()
  backLayer.style.transform = `
    translate(${center.x}px, ${center.y}px)
    translate(-50%, -50%)
  `
}

/* =========================
   CAMERA (THIS IS THE FIX)
========================= */

function updateCamera(deltaTime) {
  const holeCenter = getHoleCenter();
  frontLayer.style.transformOrigin = `${holeCenter.x}px ${holeCenter.y}px`;
  backLayer.style.transformOrigin = `${holeCenter.x}px ${holeCenter.y}px`;

  const t = Math.min(1, pullStrength * deltaTime);
  cameraPos = {
    x: lerp(cameraPos.x, holeCenter.x, t),
    y: lerp(cameraPos.y, holeCenter.y, t)
  };

  frontLayer.style.transform = `
    translate(${(window.innerWidth / 2) - cameraPos.x}px, ${(window.innerHeight / 2) - cameraPos.y}px)
  `;
  backLayer.style.transform = `
    translate(${(window.innerWidth / 2) - cameraPos.x}px, ${(window.innerHeight / 2) - cameraPos.y}px)
  `;
}


/* =========================
   MAIN LOOP
========================= */

function animate(now) {
  const deltaTime = (now - lastTime) / 1000;
  lastTime = now;
  updateCamera(deltaTime);

  if (distance(cameraPos, getHoleCenter()) < arrivalThreshold * Math.min(window.innerWidth, window.innerHeight)) {
    advanceImages();
    resetCameraToFrameStart();
  }
  requestAnimationFrame(animate);
}


/* =========================
   START
========================= */

loadInitialImages();
resetCameraToFrameStart();
animate();

</script>

</body>
</html>
