<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay Player – Portal Masking</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #161616;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: monospace;
    }

    #relay-root {
      position: relative;
      width: 80vw;
      height: 60vw;
      max-width: 900px;
      max-height: 675px;
      min-width: 320px;
      min-height: 240px;
      overflow: hidden;
      border-radius: 18px;
      background: #111;
      box-shadow: 0 10px 40px #000b;
    }

    /* BACK LAYER (full image, never clipped/reshaped) */
    #back-layer {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: center center;
      will-change: transform;
      outline: 2px dashed #2aff9a; /* debug: back layer bounds */
      outline-offset: -2px;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    /* FRONT LAYER (portal owner) */
    #front-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      transform-origin: center center;
      will-change: transform;
      pointer-events: none;

      /* "wall" visual; portal visibility is controlled by the mask */
      background: radial-gradient(circle at 50% 45%, #4e4e4e, #252525 65%, #191919 100%);

      /* Critical rule: transparency in mask = portal (reveals back) */
      -webkit-mask-image: var(--portal-mask-url);
      -webkit-mask-size: 100% 100%;
      -webkit-mask-position: center;
      -webkit-mask-repeat: no-repeat;
      mask-image: var(--portal-mask-url);
      mask-size: 100% 100%;
      mask-position: center;
      mask-repeat: no-repeat;
    }

    #debug-hole-box {
      position: absolute;
      z-index: 4;
      border: 2px solid #ffcc00;
      box-sizing: border-box;
      pointer-events: none;
    }

    #debug-crosshair {
      position: absolute;
      z-index: 4;
      width: 24px;
      height: 24px;
      margin-left: -12px;
      margin-top: -12px;
      pointer-events: none;
    }

    #debug-crosshair::before,
    #debug-crosshair::after {
      content: "";
      position: absolute;
      background: #ff4dff;
    }

    #debug-crosshair::before {
      left: 11px;
      top: 0;
      width: 2px;
      height: 24px;
    }

    #debug-crosshair::after {
      left: 0;
      top: 11px;
      width: 24px;
      height: 2px;
    }

    #debug-label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 5;
      font-size: 12px;
      line-height: 1.35;
      color: #d6ffd7;
      background: #000a;
      border: 1px solid #2aff9a66;
      border-radius: 6px;
      padding: 8px 10px;
      white-space: pre;
    }

    #image-debug-overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      font-size: 12px;
      line-height: 1.35;
      color: #fff59a;
      background: #090909e8;
      border: 1px solid #fff59a66;
      border-radius: 6px;
      padding: 8px 10px;
      white-space: pre;
      pointer-events: none;
    }

    #load-failure-overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: none;
      align-items: center;
      justify-content: center;
      background: #ff0000;
      color: #ffff00;
      font-weight: 700;
      font-size: clamp(20px, 4vw, 44px);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 2px 3px #000;
    }
  </style>
</head>
<body>
  <div id="relay-root">
    <img id="back-layer" alt="Back content">
    <div id="front-layer"></div>
    <div id="debug-hole-box"></div>
    <div id="debug-crosshair"></div>
    <div id="debug-label"></div>
    <div id="load-failure-overlay">FAILED TO LOAD</div>
  </div>
  <div id="image-debug-overlay">IMAGE DEBUG</div>

  <script>
    const relayRoot = document.getElementById('relay-root');
    const backLayer = document.getElementById('back-layer');
    const frontLayer = document.getElementById('front-layer');
    const debugHoleBox = document.getElementById('debug-hole-box');
    const debugCrosshair = document.getElementById('debug-crosshair');
    const debugLabel = document.getElementById('debug-label');
    const imageDebugOverlay = document.getElementById('image-debug-overlay');
    const loadFailureOverlay = document.getElementById('load-failure-overlay');

    // --- PATH GENERATION: Use NUM_FRAMES and generate full PNG paths ---
    const NUM_FRAMES = 100;
    const backAssets = Array.from({ length: NUM_FRAMES }, (_, i) => {
      const index = String(i).padStart(4, "0");
      return `relay-player/assets/final_rgba/f_${index}.png`;
    });
    const portalMasks = backAssets.slice(); // If needed, use same paths

    // Manual portal bounding box in FRONT layer local space.
    // This is the "window" area, not a clip path.
    const hole = { x: 260, y: 165, width: 380, height: 250 };

    const FRONT_SCALE_MIN = 1;
    const FRONT_SCALE_MAX = 2.7;
    const FRONT_SCALE_SPEED = 0.008;
    const BACK_OVERSCALE = 1.2;

    let frontScale = FRONT_SCALE_MIN;
    let cycle = 0;
    let imageDebugState = {
      src: '(not set)',
      status: 'PENDING',
      width: 0,
      height: 0
    };

    function updateImageDebugOverlay() {
      imageDebugOverlay.textContent =
        `IMAGE DEBUG\n` +
        `src: ${imageDebugState.src}\n` +
        `status: ${imageDebugState.status}\n` +
        `size: ${imageDebugState.width} x ${imageDebugState.height}`;
    }

    function getHoleBoxInRoot() {
      const rootRect = relayRoot.getBoundingClientRect();
      const centerX = hole.x + hole.width / 2;
      const centerY = hole.y + hole.height / 2;

      // FRONT layer scales around its center. We project hole into root space.
      const rootCenterX = rootRect.width / 2;
      const rootCenterY = rootRect.height / 2;
      const projectedCenterX = rootCenterX + (centerX - rootCenterX) * frontScale;
      const projectedCenterY = rootCenterY + (centerY - rootCenterY) * frontScale;

      return {
        centerX: projectedCenterX,
        centerY: projectedCenterY,
        width: hole.width * frontScale,
        height: hole.height * frontScale
      };
    }

    function updateBackTransform() {
      const holeBox = getHoleBoxInRoot();

      const imageWidth = backLayer.naturalWidth || 1;
      const imageHeight = backLayer.naturalHeight || 1;

      // Keep BACK image larger than hole box.
      const scaleX = holeBox.width / imageWidth;
      const scaleY = holeBox.height / imageHeight;
      const scale = Math.max(scaleX, scaleY) * BACK_OVERSCALE;

      // Translate to hole center first, then center image via -50% / -50%.
      backLayer.style.transform = `translate(${holeBox.centerX}px, ${holeBox.centerY}px) scale(${scale}) translate(-50%, -50%)`;

      // Mandatory debug overlays.
      debugHoleBox.style.left = `${holeBox.centerX - holeBox.width / 2}px`;
      debugHoleBox.style.top = `${holeBox.centerY - holeBox.height / 2}px`;
      debugHoleBox.style.width = `${holeBox.width}px`;
      debugHoleBox.style.height = `${holeBox.height}px`;

      debugCrosshair.style.left = `${holeBox.centerX}px`;
      debugCrosshair.style.top = `${holeBox.centerY}px`;

      debugLabel.textContent =
        `hole center: (${holeBox.centerX.toFixed(1)}, ${holeBox.centerY.toFixed(1)})\n` +
        `hole size: ${holeBox.width.toFixed(1)} x ${holeBox.height.toFixed(1)}\n` +
        `back scale: ${scale.toFixed(3)} (overscale x${BACK_OVERSCALE})`;
    }

    // --- SAFE ASSIGNMENT ---
    function setImage(img, path) {
      if (!path || !path.endsWith(".png")) {
        console.error("INVALID PATH:", path);
        return;
      }
      console.log("LOADING:", path);
      img.src = path;
      img.onload = () => {
        imageDebugState = {
          src: img.currentSrc || img.src,
          status: 'LOADED',
          width: img.naturalWidth || 0,
          height: img.naturalHeight || 0
        };
        updateImageDebugOverlay();
        updateDebugPanel();
        console.log("LOADED:", img.src, img.naturalWidth, img.naturalHeight);
        loadFailureOverlay.style.display = 'none';
        img.style.display = 'block';
        img.style.background = '';
        relayRoot.style.background = '#111';
        updateBackTransform();
      };
      img.onerror = () => {
        imageDebugState = {
          src: img.currentSrc || img.src,
          status: 'FAILED',
          width: 0,
          height: 0
        };
        updateImageDebugOverlay();
        updateDebugPanel();
        console.error("FAILED:", img.src);
        loadFailureOverlay.style.display = 'flex';
        img.style.display = 'none';
        relayRoot.style.background = '#ffff00';
      };
    }

    // --- FAIL FAST SYSTEM ---
    function loadCycleAssets() {
      const idx = cycle % backAssets.length;
      if (idx < 0 || idx >= backAssets.length) {
        console.error("INDEX OUT OF RANGE:", idx);
        return;
      }
      imageDebugState = {
        src: backAssets[idx],
        status: 'PENDING',
        width: 0,
        height: 0
      };
      updateImageDebugOverlay();
      updateDebugPanel();
      setImage(backLayer, backAssets[idx]);
      relayRoot.style.setProperty('--portal-mask-url', `url('${portalMasks[idx % portalMasks.length]}')`);
    }

    function advanceCycle() {
      cycle += 1;
      if (cycle >= backAssets.length) cycle = 0;
      loadCycleAssets();
      frontScale = FRONT_SCALE_MIN;
    }

    // (Handled by setImage now)
    // --- DEBUG PANEL (VISIBLE ON SCREEN) ---
    // Add a fixed overlay showing: current index, src, load status
    const debugPanel = document.createElement('div');
    debugPanel.id = 'frame-debug-panel';
    debugPanel.style.position = 'fixed';
    debugPanel.style.bottom = '12px';
    debugPanel.style.left = '12px';
    debugPanel.style.zIndex = '10000';
    debugPanel.style.fontSize = '14px';
    debugPanel.style.lineHeight = '1.5';
    debugPanel.style.color = '#fff';
    debugPanel.style.background = '#222e';
    debugPanel.style.border = '1px solid #fff59a66';
    debugPanel.style.borderRadius = '6px';
    debugPanel.style.padding = '8px 12px';
    debugPanel.style.whiteSpace = 'pre';
    debugPanel.style.pointerEvents = 'none';
    document.body.appendChild(debugPanel);

    function updateDebugPanel() {
      const idx = cycle % backAssets.length;
      debugPanel.textContent =
        `INDEX: ${idx}\n` +
        `SRC: ${imageDebugState.src}\n` +
        `STATUS: ${imageDebugState.status}`;
    }

    window.addEventListener('resize', updateBackTransform);

    function animate() {
      frontLayer.style.transform = `scale(${frontScale})`;
      updateBackTransform();

      frontScale += FRONT_SCALE_SPEED;
      if (frontScale >= FRONT_SCALE_MAX) {
        advanceCycle();
      }

      requestAnimationFrame(animate);
    }

    loadCycleAssets();
    updateImageDebugOverlay();
    updateDebugPanel();
    animate();
  </script>
</body>
</html>
