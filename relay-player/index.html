<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Player – Camera Through Hole</title>

<style>
/* =========================
   PAGE SETUP
========================= */
html, body {
  height: 100%;
  margin: 0;
  background: #161616;
}

body {
  display: grid;
  place-items: center;
  overflow: hidden;
}

/* =========================
   MAIN VIEWPORT (THE SCREEN)
========================= */
#relay-root {
  position: relative;
  width: 80vw;
  height: 60vw;
  max-width: 900px;
  max-height: 675px;
  overflow: hidden;
  background: #111;
}

/* =========================
   BACK LAYER (NEXT WORLD)
========================= */
#back-layer {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;

  /* stays centered unless moved */
  transform-origin: center center;

  pointer-events: none;
}

/* =========================
   FRONT LAYER (CURRENT WORLD)
========================= */
#front-layer {
  position: absolute;
  inset: 0;
  z-index: 2;

  /* THIS WILL BE CONTROLLED BY CAMERA */
  transform-origin: center center;

  pointer-events: none;

  /* temporary visual */
  background: radial-gradient(circle at center, #444, #111);
}
</style>
</head>

<body>

<div id="relay-root">

  <!-- BACK IMAGE -->
  <img id="back-layer">

  <!-- FRONT "WALL" WITH HOLE -->
  <div id="front-layer"></div>

</div>

<script>

/* =========================
   ACTORS (YOUR STORY)
========================= */

// Cameraman (controls movement)
const frontLayer = document.getElementById('front-layer')

// Next world (behind)
const backLayer = document.getElementById('back-layer')

// Stage
const relayRoot = document.getElementById('relay-root')


/* =========================
   FOREMAN (LOADS FILES)
========================= */

const NUM_FRAMES = 108

// ⚠️ FIXED PATH (NO relay-player PREFIX)
const assets = Array.from({ length: NUM_FRAMES }, (_, i) =>
  `assets/final_rgba/f_${String(i).padStart(4, '0')}.png`
)


/* =========================
   SURVEY GUY (FINDS HOLE)
========================= */

// hardcoded for now
const hole = {
  x: 260,
  y: 165,
  width: 380,
  height: 250
}

// calculate center of hole
function getHoleCenter() {
  return {
    x: hole.x + hole.width / 2,
    y: hole.y + hole.height / 2
  }
}


/* =========================
   CAMERA SETTINGS
========================= */

let scale = 1
const SPEED = 0.01
const MAX_SCALE = 2.5

let index = 0


/* =========================
   LOAD IMAGE
========================= */

function loadNextImage() {
  const path = assets[index]

  console.log("LOADING:", path)

  backLayer.src = path

  index++
  if (index >= assets.length) index = 0
}


/* =========================
   ALIGN BACK IMAGE TO HOLE
========================= */

function alignBackToHole() {

  const center = getHoleCenter()

  // move image so its center matches hole center
  backLayer.style.transform = `
    translate(${center.x}px, ${center.y}px)
    translate(-50%, -50%)
  `
}


/* =========================
   CAMERA (THIS IS THE FIX)
========================= */

function updateCamera() {

  const center = getHoleCenter()

  // 🔥 CRITICAL: AIM CAMERA AT HOLE
  frontLayer.style.transformOrigin =
    `${center.x}px ${center.y}px`

  // move forward
  frontLayer.style.transform = `scale(${scale})`
}


/* =========================
   MAIN LOOP
========================= */

function animate() {

  // cameraman moves forward
  updateCamera()

  // keep back aligned
  alignBackToHole()

  // advance camera
  scale += SPEED

  // reset when passed through
  if (scale >= MAX_SCALE) {

    scale = 1

    loadNextImage()
  }

  requestAnimationFrame(animate)
}


/* =========================
   START
========================= */

loadNextImage()
animate()

</script>

</body>
</html>
