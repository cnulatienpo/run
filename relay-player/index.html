<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG Loader Test</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      font-family: monospace;
    }
    #img {
      max-width: 80vw;
      max-height: 80vh;
      border: 4px solid lime;
      margin-bottom: 2rem;
      background: #222;
      display: block;
    }
    #status {
      font-size: 1.5rem;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 0.5em 1em;
      border-radius: 8px;
      position: fixed;
      bottom: 24px;
      left: 24px;
    }
  </style>
</head>
<body>
  <div id="gallery"></div>
  <div id="status">loading...</div>
  <script>
    const NUM_FRAMES = 108; // Adjust if you have more/less images
    const gallery = document.getElementById("gallery");
    const status = document.getElementById("status");
    let loaded = 0, failed = 0;

    function pad(num, size) {
      let s = String(num);
      while (s.length < size) s = "0" + s;
      return s;
    }

    for (let i = 1; i <= NUM_FRAMES; i++) {
      const img = document.createElement("img");
      img.src = `/relay-player/assets/pngs/final_rgba/f_${pad(i, 4)}.png`;
      img.alt = `f_${pad(i, 4)}.png`;
      img.style.maxWidth = "20vw";
      img.style.maxHeight = "20vh";
      img.style.margin = "0.5em";
      img.style.border = "4px solid gray";
      img.onload = () => {
        img.style.borderColor = "lime";
        loaded++;
        status.textContent = `LOADED: ${loaded} / ${NUM_FRAMES}, FAILED: ${failed}`;
      };
      img.onerror = () => {
        img.style.borderColor = "red";
        failed++;
        status.textContent = `LOADED: ${loaded} / ${NUM_FRAMES}, FAILED: ${failed}`;
      };
      gallery.appendChild(img);
    }
    status.textContent = `LOADING...`;
  </script>
</body>
</html>
