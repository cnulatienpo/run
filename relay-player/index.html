<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Player – Camera Through Hole</title>

<style>
/* =========================
   PAGE SETUP
========================= */
html, body {
  height: 100%;
  margin: 0;
  background: #161616;
}

body {
  display: grid;
  place-items: center;
  overflow: hidden;
}

/* =========================
   MAIN VIEWPORT (THE SCREEN)
========================= */
#relay-root {
  position: relative;
  width: 80vw;
  height: 60vw;
  max-width: 900px;
  max-height: 675px;
  overflow: hidden;
  background: #111;
}

/* =========================
   BACK LAYER (NEXT WORLD)
========================= */
#back-layer {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;

  /* stays centered unless moved */
  transform-origin: center center;

  pointer-events: none;
}

/* =========================
   FRONT LAYER (CURRENT WORLD)
========================= */
#front-layer {
  position: absolute;
  inset: 0;
  z-index: 2;

  /* THIS WILL BE CONTROLLED BY CAMERA */
  transform-origin: center center;

  pointer-events: none;

  /* temporary visual */
  background: radial-gradient(circle at center, #444, #111);
}
</style>
</head>

<body>

<div id="relay-root">

  <!-- BACK IMAGE -->
  <img id="back-layer">

  <!-- FRONT "WALL" WITH HOLE -->
  <div id="front-layer"></div>

</div>

<script>

/* =========================
   ACTORS (YOUR STORY)
========================= */

// Cameraman (controls movement)
const frontLayer = document.getElementById('front-layer')

// Next world (behind)
const backLayer = document.getElementById('back-layer')

// Stage
const relayRoot = document.getElementById('relay-root')


/* =========================
   FOREMAN (LOADS FILES)
========================= */

const NUM_FRAMES = 108

// ⚠️ FIXED PATH (NO relay-player PREFIX)
const assets = Array.from({ length: NUM_FRAMES }, (_, i) =>
  `assets/final_rgba/f_${String(i).padStart(4, '0')}.png`
)


/* =========================
   SURVEY GUY (FINDS HOLE)
========================= */

// hardcoded for now
const hole = {
  x: 260,
  y: 165,
  width: 380,
  height: 250
}

// calculate center of hole
function getHoleCenter() {
  return {
    x: hole.x + hole.width / 2,
    y: hole.y + hole.height / 2
  }
}


/* =========================
   CAMERA SETTINGS
========================= */

let scale = 1
const SPEED = 0.01
const MAX_SCALE = 2.5
let startDistance = 0.8     // how close camera starts toward hole (0–1)
let pullStrength = 4.0      // speed toward hole
let arrivalThreshold = 0.03 // distance to trigger frame swap

let cameraPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 }
let lastTime = performance.now()

let index = 0


/* =========================
   LOAD IMAGE
========================= */

function loadNextImage() {
  const path = assets[index]

  console.log("LOADING:", path)

  backLayer.src = path

  index++
  if (index >= assets.length) index = 0
}


/* =========================
   ALIGN BACK IMAGE TO HOLE
========================= */

function alignBackToHole() {

  const center = getHoleCenter()

  // move image so its center matches hole center
  backLayer.style.transform = `
    translate(${center.x}px, ${center.y}px)
    translate(-50%, -50%)
  `
}

function lerp(a, b, t) {
  return a + (b - a) * t
}

function distance(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y)
}

function resetCameraToFrameStart() {
  const holeCenter = getHoleCenter()
  const frameCenter = { x: window.innerWidth / 2, y: window.innerHeight / 2 }

  // start closer to the hole instead of centered full-frame
  cameraPos = {
    x: lerp(frameCenter.x, holeCenter.x, startDistance),
    y: lerp(frameCenter.y, holeCenter.y, startDistance)
  }
}


/* =========================
   CAMERA (THIS IS THE FIX)
========================= */

function updateCamera(deltaTime) {

  const holeCenter = getHoleCenter()

  // 🔥 CRITICAL: AIM CAMERA AT HOLE
  frontLayer.style.transformOrigin =
    `${holeCenter.x}px ${holeCenter.y}px`

  // OLD center-based zoom movement (kept for easy rollback)
  // frontLayer.style.transform = `scale(${scale})`

  // NEW pull-toward-hole movement using camera position interpolation
  const t = Math.min(1, pullStrength * deltaTime)
  cameraPos = {
    x: lerp(cameraPos.x, holeCenter.x, t),
    y: lerp(cameraPos.y, holeCenter.y, t)
  }

  // translate opposite camera movement to preserve existing render pipeline
  frontLayer.style.transform = `
    translate(${(window.innerWidth / 2) - cameraPos.x}px, ${(window.innerHeight / 2) - cameraPos.y}px)
  `
}


/* =========================
   MAIN LOOP
========================= */

function animate(now) {
  const deltaTime = (now - lastTime) / 1000
  lastTime = now

  // cameraman moves toward hole
  updateCamera(deltaTime)

  // keep back aligned
  alignBackToHole()

  // OLD zoom progression (disabled, preserved for rollback)
  // scale += SPEED

  // NEW swap trigger based on arrival at hole
  if (distance(cameraPos, getHoleCenter()) < arrivalThreshold * Math.min(window.innerWidth, window.innerHeight)) {

    // OLD zoom reset (disabled, preserved for rollback)
    // scale = 1

    loadNextImage()
    resetCameraToFrameStart()
  }

  requestAnimationFrame(animate)
}


/* =========================
   START
========================= */

loadNextImage()
resetCameraToFrameStart()
animate()

</script>

</body>
</html>
